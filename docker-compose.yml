services:
  autoquest:
    build: .
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_PRESENCE: ${DISCORD_PRESENCE:-dnd}
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-5}
      QUEST_WEBHOOK_URL: ${QUEST_WEBHOOK_URL:-}
      QUEST_WEBHOOK_GATEWAY: ${QUEST_WEBHOOK_GATEWAY:-}
      QUEST_WEBHOOK_NEW: ${QUEST_WEBHOOK_NEW:-}
      QUEST_WEBHOOK_COMPLETED: ${QUEST_WEBHOOK_COMPLETED:-}
